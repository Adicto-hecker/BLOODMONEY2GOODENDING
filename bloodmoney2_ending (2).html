  <div id="text-screen"><div id="text-content"></div></div>
  <div id="overlay"></div>
</div>
<div id="good-ending">✦ GOOD ENDING ✦</div>

<script>
const overlay = document.getElementById('overlay');
const slide1 = document.getElementById('slide1');
const slide2 = document.getElementById('slide2');
const textScreen = document.getElementById('text-screen');
const textContent = document.getElementById('text-content');
const goodEnding = document.getElementById('good-ending');

const TEXT1 = "After loosing Hary she did some reaserch to bring him back and she found some hackers who can bring him back...";
const TEXT2 = "Harvey wasnt dead he was just stuck in void wich hacker could bring him back";

function fade(el, from, to, duration) {
  return new Promise(resolve => {
    el.style.transition = 'opacity ' + duration + 'ms ease';
    el.style.opacity = from;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.opacity = to;
      setTimeout(resolve, duration);
    }));
  });
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

async function typeText(text, el) {
  el.textContent = '';
  for (let i = 0; i < text.length; i++) {
    el.textContent += text[i];
    const ch = text[i];
    const delay = ch === '.' ? 100 : ch === ',' ? 60 : ch === ' ' ? 30 : 35;
    await wait(delay);
  }
}

async function run() {
  overlay.style.opacity = 1;
  slide1.style.opacity = 0;
  await wait(500);

  // Slide 1
  slide1.style.opacity = 1;
  await fade(overlay, 1, 0, 1500);
  await wait(5000);
  await fade(overlay, 0, 1, 1200);
  slide1.style.opacity = 0;
  await wait(400);

  // Text 1 — white, visible, typing
  textContent.textContent = '';
  await fade(textScreen, 0, 1, 600);
  await typeText(TEXT1, textContent);
  await wait(2500);
  await fade(textScreen, 1, 0, 800);
  textScreen.style.opacity = 0;
  await wait(400);

  // Slide 2
  slide2.style.opacity = 1;
  await fade(overlay, 1, 0, 1500);
  await wait(5000);
  await fade(overlay, 0, 1, 1200);
  slide2.style.opacity = 0;
  await wait(400);

  // Text 2
  textContent.textContent = '';
  await fade(textScreen, 0, 1, 600);
  await typeText(TEXT2, textContent);
  await wait(2500);
  await fade(textScreen, 1, 0, 800);
  await wait(500);

  // GOOD ENDING
  goodEnding.style.transition = 'opacity 1.5s ease';
  goodEnding.style.opacity = 1;
  goodEnding.style.animation = 'glowPulse 2.5s ease-in-out infinite';
}

run();
</script>
